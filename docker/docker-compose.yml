services:

  # ============================================================
  # Open WebUI - Chat interface for local OpenAI-compatible MLX endpoints
  # Access at: http://<SERVER-IP>:3000
  # ============================================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      # Point to all mlx_lm.server instances running natively on the host
      - OPENAI_API_BASE_URLS=http://host.docker.internal:8080/v1;http://host.docker.internal:8081/v1;http://host.docker.internal:8082/v1
      - OPENAI_API_KEYS=none;none;none
      # Disable Ollama since we're using OpenAI-compatible local endpoints directly
      - ENABLE_OLLAMA_API=false
      # Point ChromaDB at the companion container
      - CHROMA_HTTP_HOST=chromadb
      - CHROMA_HTTP_PORT=8000
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_OPENAI_API_BASE_URL=http://host.docker.internal:8080/v1
      - RAG_OPENAI_API_KEY=none
      # Web search via SearXNG
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=searxng
      - WEB_SEARCH_RESULT_COUNT=5
      - WEB_SEARCH_CONCURRENT_REQUESTS=10
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
    volumes:
      - open-webui:/app/backend/data
    extra_hosts:
      # Allows containers to reach mlx_lm.server instances on the host
      - "host.docker.internal:host-gateway"
    depends_on:
      - chromadb
      - searxng

  # ============================================================
  # ChromaDB - Vector database for RAG / document Q&A
  # Access at: http://<SERVER-IP>:8000
  # ============================================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chromadb:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  # ============================================================
  # SearXNG - Self-hosted private web search
  # Internal only — not exposed on host network by default.
  # Open WebUI communicates with it via container name (searxng:8080)
  # Uncomment ports below if you want direct browser access at :8081
  # ============================================================
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    # ports:
    #   - "8081:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

volumes:
  open-webui:
  chromadb:
