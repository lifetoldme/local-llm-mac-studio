# SearXNG settings.yml
# Place this file at: ~/docker/local-llm/searxng/settings.yml
# Documentation: https://docs.searxng.org/admin/settings/index.html

use_default_settings: true

server:
  # Secret key — generated during setup-searxng.sh, do not edit manually
  secret_key: "changeme"
  limiter: false        # Disable rate limiting for local LAN use
  image_proxy: false    # Disable image proxying (not needed locally)
  http_protocol_version: "1.1"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  # JSON format is required for Open WebUI integration
  formats:
    - html
    - json

ui:
  default_theme: simple
  default_locale: en
  results_on_new_tab: false
  infinite_scroll: false

# Enabled search engines
# Full list: https://docs.searxng.org/user/configured_engines.html
engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false

  - name: arxiv
    engine: arxiv
    shortcut: arx
    disabled: false

# Outgoing request settings
outgoing:
  request_timeout: 10.0
  max_request_timeout: 20.0
  # Randomize headers to reduce fingerprinting
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
